name: "Kaizen improvement"
description: Request a fix or improvement for the Kaizen Agents organization
labels: ["kaizen"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / improvement
      description: What happened or what is inconvenient. Paste exact errors when available.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run `kaizen status --json`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Related area
      description: Optional files, commands, logs, or functions that may help.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["kaizen:P2", "kaizen:P1", "kaizen:P0"]
      default: 0
