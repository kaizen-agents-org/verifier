name: "Kaizen improvement"
description: "Request an automated fix or improvement through Kaizen Loop. The kaizen label must exist before using this form; add optional kaizen:P0/P1/P2 labels manually when priority matters."
labels: ["kaizen"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / improvement
      description: What is broken or inconvenient? Paste exact errors when available.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run `pnpm test`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Related area
      description: Optional files, commands, logs, or functions that may help.
