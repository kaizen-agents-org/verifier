name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:package-entry
      - run: pnpm test:built-cli
      - run: pnpm schema:check
      - run: pnpm eval
      - run: pnpm eval:semantic:ci
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
