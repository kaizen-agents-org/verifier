version: 1

agent:
  default: codex
  fallback: true
  model:
    claude: null
    codex: null

run:
  maxIssuesPerNight: 2
  issueTimeoutMinutes: 60
  runTimeoutMinutes: 180
  maxVerifyRetries: 1
  maxAttemptsPerIssue: 3
  maxOpenPullRequests: 3
  latestStartHour: 7

scheduler:
  jobs:
    maintenance:
      enabled: true
      schedule:
        type: daily
        time: "03:00"
      run:
        mode: maintenance
        lateStartGuard: true
    maintenance-followup:
      enabled: true
      schedule:
        type: daily
        time: "15:00"
      run:
        mode: maintenance
        lateStartGuard: false
    issue-watch:
      enabled: false
      schedule:
        type: interval
        everyMinutes: 5
      run:
        mode: watch
        skipIfRunning: true

commands:
  setup: "pnpm install --frozen-lockfile"
  verify:
    - "pnpm typecheck"
    - "pnpm test"
    - "pnpm schema:check"
    - "test -f skills/gh-link-issue-pr/SKILL.md && test -f skills/kaizen-bug-router/SKILL.md && test -f skills/pr-guardian/SKILL.md"
  verifyTimeoutMinutes: 15

builder:
  # The runner must expose this command on PATH before scheduled runs are enabled.
  # `kaizen doctor` checks this command and fails if it is unavailable.
  command: "builder-agent"
  resultPath: ".kaizen/builder/build-result.json"

verifier:
  enabled: true
  # The runner must expose this command on PATH before scheduled runs are enabled.
  # `kaizen doctor` checks this command and fails if it is unavailable.
  command: "verifier"
  resultPath: ".kaizen/verifier/verify-result.json"
  timeoutMinutes: 15

guardian:
  enabled: true
  command: "codex"
  timeoutMinutes: 90
  maxAttempts: 5

policy:
  mode: pr-only
  directCommit:
    maxChangedLines: 0
    maxChangedFiles: 0
  protectedPaths:
    - ".github/**"
    - "**/.env*"
    - "**/secrets/**"
    - "**/*migration*/**"
    - ".kaizen/**"
    - "schemas/**"
  forbiddenPaths:
    - "**/.git/**"

git:
  defaultBranch: main
  branchPrefix: "kaizen/"
  commitMessageFormat: "kaizen: {summary} (#{issue})"

instant:
  unattendedMode: pr

report:
  notification: true
  issueComments: true

issues:
  label: "kaizen"
  priorityOrder:
    - "kaizen:P0"
    - "kaizen:P1"
    - "kaizen:P2"
